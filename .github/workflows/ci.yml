name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: 

env:
  OTEL_EXPORTER_OTLP_ENDPOINT: https://logfire-us.pydantic.dev
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_SERVICE_NAME: iron-proxy

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: ironsh/iron-proxy-action@v0.1.1
        with:
          egress-rules: egress-rules.yaml
          warn: "false"

      - run: uv sync
      - run: uv run pytest -v

      - name: Test that httpbin.org is blocked
        run: |
          echo "Attempting request to httpbin.org (should be blocked)..."
          if curl -sf --max-time 5 https://httpbin.org/get; then
            echo "FAIL: request to httpbin.org was NOT blocked"
            exit 1
          else
            echo "PASS: request to httpbin.org was blocked by Iron Proxy"
          fi

      - name: Test that raw IP address is blocked
        run: |
          echo "Attempting request to 1.1.1.1 (should be blocked)..."
          if curl -sf --max-time 5 http://1.1.1.1; then
            echo "FAIL: request to 1.1.1.1 was NOT blocked"
            exit 1
          else
            echo "PASS: request to 1.1.1.1 was blocked by Iron Proxy"
          fi

      - uses: ironsh/iron-proxy-action/summary@v0.1.1
        if: always()
        with:
          show-full-paths: "true"

      - name: Dump proxy logs
        if: always()
        run: cat /var/log/iron-proxy.log
